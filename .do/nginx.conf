# Custom nginx configuration for DigitalOcean App Platform
# Fixes: 400 Bad Request - Size of a request header field exceeds server limit

# Increase buffer size for client request headers
# This is needed for large JWT tokens (like Supabase anon keys) and Laravel session cookies
client_header_buffer_size 8k;

# Increase the number and size of buffers for large client headers
# Increased to handle large Laravel Sanctum session cookies
large_client_header_buffers 8 32k;

# Increase max body size for file uploads
client_max_body_size 10M;

# Timeout settings
client_body_timeout 60s;
client_header_timeout 60s;

# Enable gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

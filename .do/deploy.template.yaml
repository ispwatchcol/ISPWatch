spec:
  name: ispwatch
  services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
    - path: /
    run_command: |
      mkdir -p storage/keys
      if [ -n "$MIKROTIK_CORE_SSH_KEY_B64" ]; then
        printf '%s' "$MIKROTIK_CORE_SSH_KEY_B64" | base64 -d > storage/keys/mikrotik_core_id_ed25519
        chmod 600 storage/keys/mikrotik_core_id_ed25519
      fi
      php artisan migrate --force
      heroku-php-apache2 public/
    build_command: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
    envs:
    - key: APP_ENV
      value: production
    - key: APP_DEBUG
      value: "false"
